<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Concept Detailing">
  <defs>
    <radialGradient id="cdbg" cx="38%" cy="30%" r="80%">
      <stop offset="0" stop-color="#1b1c20"/>
      <stop offset="0.6" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#040405"/>
    </radialGradient>
  </defs>
  <circle cx="110" cy="110" r="109" fill="url(#cdbg)"/>
  <!-- красная горизонтальная линия -->
  <line x1="12" y1="139" x2="208" y2="139" stroke="#D81F27" stroke-width="2.6"/>
  <!-- красный перевёрнутый треугольник -->
  <path d="M44 112 L176 112 L110 200 Z" fill="#D81F27"/>
  <!-- CONCEPT -->
  <text x="110" y="99" text-anchor="middle" textLength="184" lengthAdjust="spacingAndGlyphs"
        font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="58" fill="#ffffff">CONCEPT</text>
  <!-- detailing -->
  <text x="110" y="152" text-anchor="middle" textLength="132" lengthAdjust="spacingAndGlyphs"
        font-family="'Arial','Helvetica',sans-serif" font-weight="300" font-size="33" fill="#f5f5f5" letter-spacing="2">detailing</text>
</svg>
