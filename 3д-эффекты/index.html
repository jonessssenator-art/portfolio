<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог 3D-эффектов</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #0d0f14;
    color: #e8eaf0;
    min-height: 100vh;
    padding: 40px 24px;
  }
  h1 { font-size: 28px; margin-bottom: 6px; }
  .subtitle { color: #8a90a0; margin-bottom: 32px; font-size: 14px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }
  .card {
    background: #161923;
    border: 1px solid #262b3a;
    border-radius: 14px;
    overflow: hidden;
    transition: border-color .2s, transform .2s;
  }
  .card:hover { border-color: #4a5578; transform: translateY(-2px); }
  .card iframe {
    width: 100%;
    height: 240px;
    border: 0;
    display: block;
    background: #000;
    pointer-events: none;
  }
  .card .info { padding: 14px 16px 16px; }
  .card h3 { font-size: 16px; margin-bottom: 4px; }
  .card .meta { font-size: 12px; color: #8a90a0; margin-bottom: 10px; }
  .card .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    background: #232840;
    color: #9db1ff;
  }
  .card a.open {
    display: inline-block;
    font-size: 13px;
    color: #0d0f14;
    background: #9db1ff;
    padding: 7px 14px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
  }
  .card a.open:hover { background: #b8c6ff; }
  .empty {
    text-align: center;
    color: #565d70;
    padding: 80px 20px;
    border: 2px dashed #262b3a;
    border-radius: 14px;
    font-size: 15px;
  }
</style>
</head>
<body>
  <h1>Каталог 3D-эффектов</h1>
  <p class="subtitle">Живой предпросмотр — клик «Открыть» разворачивает эффект на весь экран</p>
  <div class="grid" id="grid"></div>

<script>
// При добавлении эффекта — дописать объект сюда.
const EFFECTS = [
  { file: 'effects/01-webgl-snake.html', name: 'Процедурная 3D-змея', tech: 'three.js · WebGL · GLSL', tags: ['hero-фон', 'интерактив', 'следует за мышью'] },
  { file: 'effects/02-black-hole.html', name: 'Чёрная дыра «Stable Singularity»', tech: 'three.js · GSAP · GLSL', tags: ['hero-фон', 'полноэкранный', 'автосмена состояний', 'HUD'] },
  { file: 'effects/03-threads.html', name: 'Threads — струящиеся нити', tech: 'чистый WebGL · GLSL · перлин-шум', tags: ['hero-фон', 'следует за мышью', 'без зависимостей'] },
];

const grid = document.getElementById('grid');
if (EFFECTS.length === 0) {
  grid.outerHTML = '<div class="empty">Каталог пока пуст — эффекты появятся здесь по мере добавления</div>';
} else {
  for (const e of EFFECTS) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <iframe src="${e.file}" loading="lazy" title="${e.name}"></iframe>
      <div class="info">
        <h3>${e.name}</h3>
        <div class="meta">${e.tech}</div>
        <div class="tags">${(e.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <a class="open" href="${e.file}" target="_blank">Открыть</a>
      </div>`;
    grid.appendChild(card);
  }
}
</script>
</body>
</html>
