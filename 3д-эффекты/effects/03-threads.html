<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads — струящиеся нити</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050508; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
// ===== Настройки эффекта =====
const CONFIG = {
  color: [1.0, 1.0, 1.0],   // цвет нитей (RGB 0..1)
  amplitude: 1.4,           // размах колебаний
  distance: 0.6,            // разброс нитей по вертикали (0 — все в одной полосе)
  mouseReact: true,         // реакция на мышь
  mouseSmooth: 0.05,        // плавность следования за мышью
};

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { alpha: false, antialias: true });

const VERT = `
attribute vec2 position;
void main() { gl_Position = vec4(position, 0.0, 1.0); }
`;

const FRAG = `
precision highp float;

uniform float iTime;
uniform vec3  iResolution;
uniform vec3  uColor;
uniform float uAmplitude;
uniform float uDistance;
uniform vec2  uMouse;

#define PI 3.1415926538

const int   u_line_count = 40;
const float u_line_width = 7.0;
const float u_line_blur  = 10.0;

float Perlin2D(vec2 P) {
  vec2 Pi = floor(P);
  vec4 Pf_Pfmin1 = P.xyxy - vec4(Pi, Pi + 1.0);
  vec4 Pt = vec4(Pi.xy, Pi.xy + 1.0);
  Pt = Pt - floor(Pt * (1.0 / 71.0)) * 71.0;
  Pt += vec2(26.0, 161.0).xyxy;
  Pt *= Pt;
  Pt = Pt.xzxz * Pt.yyww;
  vec4 hash_x = fract(Pt * (1.0 / 951.135664));
  vec4 hash_y = fract(Pt * (1.0 / 642.949883));
  vec4 grad_x = hash_x - 0.49999;
  vec4 grad_y = hash_y - 0.49999;
  vec4 grad_results = inversesqrt(grad_x * grad_x + grad_y * grad_y)
    * (grad_x * Pf_Pfmin1.xzxz + grad_y * Pf_Pfmin1.yyww);
  grad_results *= 1.4142135623730950;
  vec2 blend = Pf_Pfmin1.xy * Pf_Pfmin1.xy * Pf_Pfmin1.xy
    * (Pf_Pfmin1.xy * (Pf_Pfmin1.xy * 6.0 - 15.0) + 10.0);
  vec4 blend2 = vec4(blend, vec2(1.0 - blend));
  return grad_results.x * blend2.z * blend2.w
       + grad_results.y * blend2.x * blend2.w
       + grad_results.z * blend2.z * blend2.y
       + grad_results.w * blend2.x * blend2.y;
}

float pixel(float count, vec2 resolution) {
  return (1.0 / max(resolution.x, resolution.y)) * count;
}

float lineFn(vec2 st, float width, float perc, float offset,
             vec2 mouse, float time, float amplitude, float distance) {
  float split_offset = perc * 0.4;
  float split_point = 0.1 + split_offset;

  float amplitude_normal = smoothstep(split_point, 0.7, st.x);
  float amplitude_strength = 0.5;
  float finalAmplitude = amplitude_normal * amplitude_strength
    * amplitude * (1.0 + (mouse.y - 0.5) * 0.2);

  float time_scaled = time / 10.0 + (mouse.x - 0.5) * 1.0;
  float blur = smoothstep(split_point, split_point + 0.05, st.x) * perc;

  float xnoise = mix(
    Perlin2D(vec2(time_scaled, st.x + perc) * 2.5),
    Perlin2D(vec2(time_scaled, st.x + time_scaled) * 3.5) / 1.5,
    st.x * 0.3
  );

  float y = 0.5 + (perc - 0.5) * distance + xnoise / 2.0 * finalAmplitude;

  float line_start = smoothstep(
    y + (width / 2.0) + (u_line_blur * pixel(1.0, iResolution.xy) * blur),
    y, st.y
  );
  float line_end = smoothstep(
    y,
    y - (width / 2.0) - (u_line_blur * pixel(1.0, iResolution.xy) * blur),
    st.y
  );

  return clamp(
    (line_start - line_end) * (1.0 - smoothstep(0.0, 1.0, pow(perc, 0.3))),
    0.0, 1.0
  );
}

void main() {
  vec2 uv = gl_FragCoord.xy / iResolution.xy;

  float line_strength = 1.0;
  for (int i = 0; i < u_line_count; i++) {
    float p = float(i) / float(u_line_count);
    line_strength *= (1.0 - lineFn(
      uv,
      u_line_width * pixel(1.0, iResolution.xy) * (1.0 - p),
      p,
      (PI * 1.0) * p,
      uMouse, iTime, uAmplitude, uDistance
    ));
  }

  float colorVal = 1.0 - line_strength;
  gl_FragColor = vec4(uColor * colorVal, 1.0);
}
`;

function compile(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    throw new Error(gl.getShaderInfoLog(sh));
  }
  return sh;
}

const program = gl.createProgram();
gl.attachShader(program, compile(gl.VERTEX_SHADER, VERT));
gl.attachShader(program, compile(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  throw new Error(gl.getProgramInfoLog(program));
}
gl.useProgram(program);

// Полноэкранный треугольник
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
const posLoc = gl.getAttribLocation(program, 'position');
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

const U = {
  iTime: gl.getUniformLocation(program, 'iTime'),
  iResolution: gl.getUniformLocation(program, 'iResolution'),
  uColor: gl.getUniformLocation(program, 'uColor'),
  uAmplitude: gl.getUniformLocation(program, 'uAmplitude'),
  uDistance: gl.getUniformLocation(program, 'uDistance'),
  uMouse: gl.getUniformLocation(program, 'uMouse'),
};

gl.uniform3fv(U.uColor, CONFIG.color);
gl.uniform1f(U.uAmplitude, CONFIG.amplitude);
gl.uniform1f(U.uDistance, CONFIG.distance);

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(canvas.clientWidth * dpr);
  canvas.height = Math.floor(canvas.clientHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.uniform3f(U.iResolution, canvas.width, canvas.height, canvas.width / canvas.height);
}
window.addEventListener('resize', resize);
resize();

// Мышь: плавное следование, при уходе курсора — возврат в центр
let targetMouse = [0.5, 0.5];
let currentMouse = [0.5, 0.5];
if (CONFIG.mouseReact) {
  window.addEventListener('mousemove', (e) => {
    targetMouse = [
      e.clientX / window.innerWidth,
      1.0 - e.clientY / window.innerHeight,
    ];
  });
  document.addEventListener('mouseleave', () => { targetMouse = [0.5, 0.5]; });
}

const t0 = performance.now();
function frame(now) {
  currentMouse[0] += CONFIG.mouseSmooth * (targetMouse[0] - currentMouse[0]);
  currentMouse[1] += CONFIG.mouseSmooth * (targetMouse[1] - currentMouse[1]);
  gl.uniform2f(U.uMouse, currentMouse[0], currentMouse[1]);
  gl.uniform1f(U.iTime, (now - t0) * 0.001);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
